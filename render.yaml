services:
  - type: web
    name: reprank
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      # Plak hier (in het Render-dashboard) je Neon Postgres connection string,
      # dan is de ranglijst blijvend. Zonder deze var draait hij op tijdelijke opslag.
      - key: DATABASE_URL
        sync: false
