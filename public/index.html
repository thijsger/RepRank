<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RepRank — Ranglijst</title>
    <style>
      :root { --bg:#0b0b10; --card:#15151d; --line:#26262f; --txt:#f2f2f5; --sub:#8b8b9a; --accent:#7c6cff; }
      * { box-sizing: border-box; }
      body { margin:0; font-family:-apple-system,Inter,Segoe UI,sans-serif; background:var(--bg); color:var(--txt); }
      header { padding:28px 20px 8px; text-align:center; }
      h1 { margin:0; font-size:26px; letter-spacing:-.5px; }
      h1 span { background:linear-gradient(90deg,#7c6cff,#a78bfa); -webkit-background-clip:text; background-clip:text; color:transparent; }
      p.sub { color:var(--sub); margin:4px 0 18px; text-align:center; font-size:13px; }
      .tabs { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; padding:0 16px 16px; }
      .tab { border:1px solid var(--line); background:var(--card); color:var(--sub); padding:8px 14px; border-radius:999px; cursor:pointer; font-size:13px; font-weight:600; }
      .tab.active { background:var(--accent); color:#fff; border-color:transparent; }
      main { max-width:560px; margin:0 auto; padding:0 16px 60px; }
      .row { display:flex; align-items:center; gap:12px; padding:12px 14px; border-bottom:1px solid var(--line); }
      .row:first-child { border-top:1px solid var(--line); }
      .rank { width:32px; font-weight:700; color:var(--sub); }
      .rank.top { color:var(--accent); }
      .name { flex:1; font-weight:500; }
      .val { font-variant-numeric:tabular-nums; font-weight:700; font-size:17px; }
      .empty { color:var(--sub); text-align:center; padding:40px 0; }
    </style>
  </head>
  <body>
    <header>
      <h1><span>RepRank</span></h1>
      <p class="sub">Wereldranglijst · zoveel mogelijk reps, goede vorm</p>
    </header>
    <div class="tabs" id="tabs"></div>
    <main id="board"></main>
    <script>
      const fmt = (v, unit) => unit === "sec"
        ? Math.floor(v/60) + ":" + String(v%60).padStart(2,"0")
        : v;
      let data = {}, active = null;
      async function load() {
        const r = await fetch("/api/leaderboards");
        data = await r.json();
        const exs = Object.keys(data);
        if (!active) active = exs[0];
        const tabs = document.getElementById("tabs");
        tabs.innerHTML = exs.map(ex =>
          `<button class="tab ${ex===active?'active':''}" data-ex="${ex}">${data[ex].label}</button>`
        ).join("");
        tabs.querySelectorAll(".tab").forEach(b => b.onclick = () => { active = b.dataset.ex; render(); });
        render();
      }
      function render() {
        const d = data[active];
        const board = document.getElementById("board");
        const tabs = document.getElementById("tabs");
        tabs.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.ex===active));
        if (!d || !d.top.length) { board.innerHTML = `<div class="empty">Nog geen scores. Wees de eerste 💪</div>`; return; }
        board.innerHTML = d.top.map(e =>
          `<div class="row"><div class="rank ${e.rank<=3?'top':''}">${e.rank}</div><div class="name">${e.name}</div><div class="val">${fmt(e.value,d.unit)}</div></div>`
        ).join("");
      }
      load();
      setInterval(load, 15000);
    </script>
  </body>
</html>
